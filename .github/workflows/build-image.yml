name: Build & push image

# Builds the Agent Chat UI image for ARM64 (Oracle A1) and pushes to GHCR.
# The UI uses the same-origin /api proxy; NEXT_PUBLIC_API_URL must be an ABSOLUTE URL (the LangGraph
# SDK does `new URL(apiUrl)`), baked from the repo variable PUBLIC_API_URL:
#   Settings -> Secrets and variables -> Actions -> Variables:
#     PUBLIC_API_URL = https://muffin.rafiki.guru/api
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.PUBLIC_API_URL }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/agent-chat-ui-docker:latest
            ghcr.io/${{ github.repository_owner }}/agent-chat-ui-docker:${{ github.sha }}
      # Auto-CD: tell muffin-deployment a fresh image is on GHCR so it redeploys the Swarm stack
      # (deploy.yml listens for repository_dispatch type=deploy). Needs a cross-repo PAT — the
      # built-in GITHUB_TOKEN can't dispatch to another repo.
      - name: Trigger deploy
        if: github.ref == 'refs/heads/main'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DEPLOY_DISPATCH_TOKEN }}
          repository: ${{ github.repository_owner }}/muffin-deployment
          event-type: deploy
          client-payload: '{"repo": "${{ github.repository }}", "sha": "${{ github.sha }}"}'
